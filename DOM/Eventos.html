<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Bem Vindo</h1>
    <div>
        <span id="spn-nome"></span>
        <span id="spn-Sobrenome"></span>
    </div>
    <input 
    type="text" 
    id="nome" 
    placeholder="digite seu nome" 
    onblur="criarSobrenome()"
    onkeypress="replicanome(this.value)"
    />
    <script>
        let criouSobrenome = false;

        function replicanome(nome){
            document.getElementById("spn-nome").textContent = nome;
        }
        function replicaSobrenome(sobrenome){
            document.getElementById("spn-Sobrenome").textContent = sobrenome;
        }


        function criarSobrenome(){
            if(!criouSobrenome) {
            document.body.innerHTML +=`
            <input 
                type="text" 
                id="sobrenome" 
                placeholder="digite seu sobrenome"
                onkeypress="replicaSobrenome(this.value)"
            >
            `;
            criouSobrenome = true;
        }
           
        }
        function trocaTitulo(){

            const novotitulo = prompt("Digite o novo titulo");

            document.title = `Pagina: ${novotitulo}`;
            document.body.innerHTML += `<h2>Pagina do ${novotitulo}</h2>`;
        }
    </script>
    
</body>
</html>
